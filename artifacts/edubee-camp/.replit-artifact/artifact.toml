kind = "web"
previewPath = "/"
title = "Edubee CAMP"
version = "1.0.0"
id = "artifacts/edubee-camp"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19156
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/edubee-camp run dev"

[services.env]
PORT = "19156"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/edubee-camp", "run", "build"]
run = ["pnpm", "--filter", "@workspace/edubee-camp", "run", "serve"]

[services.production.env]
PORT = "19156"
BASE_PATH = "/"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
