kind = "web"
previewPath = "/portal/"
title = "Edubee Portal"
version = "1.0.0"
id = "artifacts/edubee-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = ["/portal/"]
localPort = 23810

[services.development]
run = "pnpm --filter @workspace/edubee-portal run dev"

[services.env]
PORT = "23810"
BASE_PATH = "/portal/"

[services.production]
build = ["pnpm", "--filter", "@workspace/edubee-portal", "run", "build"]
run = ["pnpm", "--filter", "@workspace/edubee-portal", "run", "serve"]

[services.production.env]
PORT = "23810"
BASE_PATH = "/portal/"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
