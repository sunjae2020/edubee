kind = "web"
previewPath = "/admin-crm/"
title = "Edubee CRM"
version = "1.0.0"
id = "artifacts/edubee-admin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/admin-crm/" ]
localPort = 20008

[services.development]
run = "pnpm --filter @workspace/edubee-admin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/edubee-admin", "run", "build" ]
publicDir = "artifacts/edubee-admin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20008"
BASE_PATH = "/admin-crm/"
