kind = "web"
previewPath = "/admin/"
title = "Edubee CRM"
version = "1.0.0"
id = "artifacts/edubee-admin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = ["/admin/"]
localPort = 20008

[services.development]
run = "pnpm --filter @workspace/edubee-admin run dev"

[services.env]
PORT = "20008"
BASE_PATH = "/admin/"

[services.production]
build = ["pnpm", "--filter", "@workspace/edubee-admin", "run", "build"]
run = ["pnpm", "--filter", "@workspace/edubee-admin", "run", "serve"]

[services.production.env]
PORT = "20008"
BASE_PATH = "/admin/"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
