kind = "web"
previewPath = "/"
title = "Edubee Website"
version = "1.0.0"
id = "artifacts/edubee-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25981
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/edubee-website run dev"

[services.env]
PORT = "25981"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/edubee-website", "run", "build"]
run = ["pnpm", "--filter", "@workspace/edubee-website", "run", "serve"]

[services.production.env]
PORT = "25981"
BASE_PATH = "/"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
